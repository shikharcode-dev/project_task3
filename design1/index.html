<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squid Game UI</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

  <div class="container">

    <nav class="navbar">
      <div class="logo">SQUID <span>GAME</span></div>

      <ul class="nav-links">
        <li>About</li>
        <li class="active">Watch now</li>
        <li>Actors</li>
        <li>Contact</li>
      </ul>

      <div class="menu">
        <i class="fa-solid fa-bars"></i>
      </div>
    </nav>

    <section class="hero">


      <div class="left-content">

        <h1>
          SQUID <br />
          <span>GAME</span>
        </h1>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br />
          Season 1: 9 Episodes
        </p>

        <div class="buttons">
          <button class="play-btn">
            <i class="fa-solid fa-play"></i> Play Now
          </button>

          <button class="trailer-btn">
            <i class="fa-regular fa-circle-play"></i> Watch Trailer
          </button>
        </div>
      </div>


      <div class="right-content">
       <img src="images/hero.png" alt="Squid Game Guard">
      </div>


      <div class="scroll-text">
        <span>SCROLL</span>
        <div class="line"></div>
      </div>

      <div class="social-icons">
        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-facebook-f"></i>
      </div>

    </section>


    <section class="cards">
      <div class="card">
        <img src="images/card1.jpeg" alt="">
      </div>
      <div class="card">
        <img src="images/card2.jpeg" alt="">
      </div>
      <div class="card">
        <img src="images/card3.jpeg" alt="">
      </div>

    </section>

  </div>

</body>
</html>
